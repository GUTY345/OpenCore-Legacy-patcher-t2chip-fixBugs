name: Build PKG Installer + Uninstaller

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name to build (leave empty = latest)'
        required: false
        default: 'latest'

jobs:
  build-pkg:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ inputs.tag_name || 'latest' }}" >> $GITHUB_OUTPUT
          fi

      - name: Download Source from Release
        uses: robinraju/release-downloader@v1
        with:
          repository: ${{ github.repository }}
          tag: ${{ steps.version.outputs.TAG }}
          fileName: "*.zip"
          out-file-path: ./downloaded
          latest: ${{ steps.version.outputs.TAG == 'latest' }}

      - name: Extract Source
        run: |
          mkdir -p ./source
          unzip ./downloaded/*.zip -d ./source

      - name: Run Build Script
        run: |
          chmod +x ./ci_tooling/build_pkg.sh
          ./ci_tooling/build_pkg.sh "${{ steps.version.outputs.TAG }}"

      - name: Upload PKGs to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          files: |
            ./dist/*.pkg
