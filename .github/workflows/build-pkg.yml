name: Build PKG Installer + Uninstaller

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-pkg:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Source from Release
        uses: robinraju/release-downloader@v1
        with:
          repository: ${{ github.repository }}
          tag: ${{ github.event.release.tag_name }}
          fileName: "*.zip"
          out-file-path: ./downloaded

      - name: Extract Source
        run: |
          mkdir -p ./source
          unzip ./downloaded/*.zip -d ./source

      - name: Run Build Script
        run: |
          chmod +x ./ci_tooling/build_pkg.sh
          ./ci_tooling/build_pkg.sh "${{ github.event.release.tag_name }}"

      - name: Upload PKGs to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ./dist/*.pkg
